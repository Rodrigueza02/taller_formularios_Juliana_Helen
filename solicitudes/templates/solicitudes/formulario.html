<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Solicitud</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #eef2ff; display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 620px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #3730a3; margin-bottom: 8px; font-size: 1.8rem; }
        p.subtitle { color: #666; margin-bottom: 30px; font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; color: #333; margin-bottom: 6px; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; transition: border 0.2s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #3730a3; }
        button { width: 100%; padding: 12px; background: #3730a3; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #1e1b6e; }
        .errorlist { color: #e63946; font-size: 0.85rem; margin-top: 4px; list-style: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📝 Formulario de Solicitud</h1>
        <p class="subtitle">Complete el formulario para enviar su solicitud.</p>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <ul class="errorlist">
                            {% for error in field.errors %}<li>{{ error }}</li>{% endfor %}
                        </ul>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit">Enviar Solicitud</button>
        </form>
    </div>
</body>
</html>
