<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia Registrada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; padding: 50px 40px; text-align: center; max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #2d6a4f; margin-bottom: 12px; }
        p { color: #555; margin-bottom: 30px; line-height: 1.6; }
        a { display: inline-block; padding: 12px 28px; background: #2d6a4f; color: white; text-decoration: none; border-radius: 8px; font-size: 0.95rem; transition: background 0.2s; }
        a:hover { background: #1b4332; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>¡Asistencia Registrada!</h1>
        <p>Tu asistencia ha sido guardada exitosamente en el sistema.</p>
        <a href="{% url 'asistencia:formulario' %}">Registrar otra asistencia</a>
    </div>
</body>
</html>
